syntax = "proto3";

package transaction;
option go_package = "gateway-service/pb";

message Instruction {
    string program_id = 1;
    repeated string accounts = 2;
    bytes data = 3;
}

message Transaction {
    string signature = 1;
    int64 timestamp = 2;
    string fee_payer = 3;
    repeated Instruction instructions = 4;
    uint64 fee = 5;
    string slot = 6;
}

// The service definition representing our ingestion endpoint
service IngestionService {
    // A client-side streaming RPC: the generator will stream multiple transactions over one connection
    rpc StreamTransactions(stream Transaction) returns (IngestionResponse);
}

message IngestionResponse {
    bool success = 1;
    int64 processed_count = 2;
}